<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Supernova OS — Desktop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  :root {
    --accent: #7b5cff;
    --text-main: #f5f5ff;
    --text-muted: #9ca3c7;
    --border: rgba(255,255,255,0.08);
    --window-bg: rgba(10,12,25,0.9);
    --window-blur: blur(14px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    height: 100vh;
    overflow: hidden;
    background: #050712;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
      "Segoe UI", sans-serif;
    color: var(--text-main);
  }

  body.theme-nebula {
    --accent: #7b5cff;
    background: url("https://images.hdqwalls.com/wallpapers/nebula-5k-oj.jpg") center/cover no-repeat fixed;
  }

  body.theme-eclipse {
    --accent: #f97316;
    background: url("https://wallpaperaccess.com/full/1416639.jpg") center/cover no-repeat fixed;
  }

  body.theme-aurora {
    --accent: #22c55e;
    background: url("https://images.hdqwalls.com/wallpapers/aurora-borealis-northern-lights-4k-kr.jpg") center/cover no-repeat fixed;
  }

  .desktop-clock {
    position: absolute;
    top: 18px;
    right: 24px;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(5,7,18,0.7);
    border: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--text-muted);
    backdrop-filter: blur(12px);
  }

  .dock {
    position: absolute;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 22px;
    padding: 14px 22px;
    background: rgba(5,7,18,0.7);
    border: 1px solid var(--border);
    border-radius: 18px;
    backdrop-filter: blur(14px);
  }

  .dock-item {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .dock-item:hover {
    transform: scale(1.25);
  }

  .dock-item img {
    width: 48px;
    height: 48px;
    border-radius: 12px;
  }

  .dock-item span {
    margin-top: 6px;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .dock-item.playing img {
    box-shadow: 0 0 18px var(--accent);
  }

  .dock-item.playing::after {
    content: "";
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    position: absolute;
    bottom: -4px;
  }

  .window {
    position: absolute;
    top: 120px;
    left: 120px;
    width: 520px;
    height: 360px;
    background: var(--window-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    backdrop-filter: var(--window-blur);
    box-shadow: 0 18px 40px rgba(0,0,0,0.45);
    display: none;
    overflow: hidden;
    opacity: 0;
    transform: scale(0.92);
    transition: opacity 0.25s ease, transform 0.25s ease;
  }

  .window.open {
    opacity: 1;
    transform: scale(1);
  }

  .window.small { width: 320px; height: 220px; }
  .window.medium { width: 420px; height: 330px; }

  .titlebar {
    height: 34px;
    background: rgba(255,255,255,0.06);
    border-bottom: 1px solid var(--border);
    border-radius: 12px 12px 0 0;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 12px;
    cursor: grab;
  }

  .titlebar span {
    flex: 1;
    text-align: center;
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  .controls {
    display: flex;
    gap: 8px;
  }

  .controls div {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    cursor: pointer;
  }

  .close { background: #ef4444; }
  .min   { background: #facc15; }
  .max   { background: #22c55e; }

  .window-content {
    padding: 10px 12px;
    height: calc(100% - 34px);
    font-size: 0.85rem;
    color: var(--text-main);
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 0 0 12px 12px;
  }

  .game-loader {
    position: absolute;
    inset: 0;
    background: #020617;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "JetBrains Mono", monospace;
    color: #22c55e;
    font-size: 0.9rem;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0.4; }
  }

  .clock-display {
    font-size: 2.4rem;
    font-weight: 600;
    text-align: center;
    margin-top: 24px;
  }

  .clock-date {
    margin-top: 8px;
    text-align: center;
    font-size: 0.9rem;
    color: var(--text-muted);
  }

  .calc-display {
    width: 100%;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(15,23,42,0.9);
    font-size: 1.1rem;
    text-align: right;
    margin-bottom: 10px;
    font-family: "JetBrains Mono", ui-monospace;
    color: white;
  }

  .calc-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0,1fr));
    gap: 8px;
  }

  .calc-btn {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(15,23,42,0.9);
    cursor: pointer;
    font-size: 0.9rem;
    text-align: center;
    transition: background 0.12s ease-out, transform 0.12s ease-out;
  }

  .calc-btn.op { color: var(--accent); }

  .calc-btn:hover {
    background: rgba(30,64,175,0.9);
    transform: translateY(-1px);
  }

  .terminal-output {
    height: calc(100% - 40px);
    background: #020617;
    border-radius: 8px;
    padding: 8px;
    font-family: "JetBrains Mono", ui-monospace;
    font-size: 0.75rem;
    color: #a5f3fc;
    overflow-y: auto;
    border: 1px solid rgba(148,163,184,0.4);
  }

  .terminal-input-row {
    margin-top: 6px;
    display: flex;
    gap: 6px;
    align-items: center;
    font-family: "JetBrains Mono", ui-monospace;
    font-size: 0.75rem;
  }

  .terminal-input-row span { color: #22c55e; }

  .terminal-input-row input {
    flex: 1;
    background: #020617;
    border-radius: 6px;
    border: 1px solid rgba(148,163,184,0.4);
    padding: 4px 6px;
    color: #e5e7eb;
    outline: none;
    font-family: inherit;
    font-size: inherit;
  }

  .theme-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0,1fr));
    gap: 10px;
    margin-top: 10px;
  }

  .theme-card {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(15,23,42,0.9);
    cursor: pointer;
    font-size: 0.8rem;
    text-align: center;
    transition: transform 0.12s ease-out, box-shadow 0.12s ease-out,
      border-color 0.12s ease-out;
    color: var(--text-main);
  }

  .theme-card:hover {
    transform: translateY(-1px);
    border-color: var(--accent);
    box-shadow: 0 0 18px rgba(123,92,255,0.4);
  }

  .theme-preview {
    width: 100%;
    height: 70px;
    border-radius: 8px;
    margin-bottom: 6px;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .theme-preview.nebula {
    background-image: url("https://images.hdqwalls.com/wallpapers/nebula-5k-oj.jpg");
  }

  .theme-preview.eclipse {
    background-image: url("https://wallpaperaccess.com/full/1416639.jpg");
  }

  .theme-preview.aurora {
    background-image: url("https://images.hdqwalls.com/wallpapers/aurora-borealis-northern-lights-4k-kr.jpg");
  }

  .clear-cache-btn {
    margin-top: 14px;
    padding: 8px 10px;
    width: 100%;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(127,29,29,0.9);
    color: #fee2e2;
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.12s ease-out, transform 0.12s ease-out;
  }

  .clear-cache-btn:hover {
    background: rgba(185,28,28,0.95);
    transform: translateY(-1px);
  }

  .notes-textarea {
    width: 100%;
    height: calc(100% - 24px);
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(15,23,42,0.95);
    padding: 8px 10px;
    resize: none;
    outline: none;
    color: var(--text-main);
    font-size: 0.85rem;
    font-family: system-ui, sans-serif;
  }
</style>
</head>

<script>
function openWindow(id) {
  const win = document.getElementById(id);
  win.style.display = "block";
  win.style.zIndex = Date.now();
  requestAnimationFrame(() => win.classList.add("open"));
}

function initializeWindow(win) {
  const bar = win.querySelector('.titlebar');
  let offsetX, offsetY, dragging = false;

  bar.addEventListener('mousedown', e => {
    dragging = true;
    offsetX = e.clientX - win.offsetLeft;
    offsetY = e.clientY - win.offsetTop;
    bar.style.cursor = "grabbing";
    win.style.zIndex = Date.now();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    win.style.left = (e.clientX - offsetX) + "px";
    win.style.top = (e.clientY - offsetY) + "px";
  });

  document.addEventListener('mouseup', () => {
    dragging = false;
    bar.style.cursor = "grab";
  });

  const [close, min, max] = win.querySelectorAll('.controls div');

  close.onclick = () => {
    if (win.id === "fxWin") {
      renderGamesGrid();
    }
    win.classList.remove("open");
    setTimeout(() => {
      win.style.display = "none";
    }, 200);
  };

  min.onclick = () => {
    win.classList.remove("open");
    setTimeout(() => {
      win.style.display = "none";
    }, 200);
  };

  max.onclick = () => {
    if (win.classList.contains("maximized")) {
      win.classList.remove("maximized");
      win.style.width = win.dataset.originalWidth;
      win.style.height = win.dataset.originalHeight;
      win.style.left = win.dataset.originalLeft;
      win.style.top = win.dataset.originalTop;
    } else {
      win.dataset.originalWidth = win.style.width;
      win.dataset.originalHeight = win.style.height;
      win.dataset.originalLeft = win.style.left;
      win.dataset.originalTop = win.style.top;
      win.classList.add("maximized");
      win.style.left = "0";
      win.style.top = "0";
      win.style.width = "100vw";
      win.style.height = "100vh";
    }
  };
}

document.querySelectorAll('.window').forEach(initializeWindow);

function updateClocks() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  const s = now.getSeconds().toString().padStart(2,'0');

  const desktopClock = document.getElementById('desktopClock');
  if (desktopClock) desktopClock.textContent = `${h}:${m}:${s}`;

  const clockDisplay = document.getElementById('clockDisplay');
  const clockDate = document.getElementById('clockDate');
  if (clockDisplay && clockDate) {
    clockDisplay.textContent = `${h}:${m}:${s}`;
    clockDate.textContent = now.toLocaleDateString(undefined, {
      weekday: 'short',
      year: 'numeric',
      month: 'short',
      day: 'numeric'
    });
  }
}
updateClocks();
setInterval(updateClocks, 1000);

const calcDisplay = document.getElementById('calcDisplay');
let calcBuffer = "0";
let calcLastOp = null;
let calcStored = null;

function updateCalcDisplay() {
  calcDisplay.value = calcBuffer;
}

function handleCalcKey(key) {
  if (!isNaN(key)) {
    calcBuffer = calcBuffer === "0" ? key : calcBuffer + key;
  } else if (key === ".") {
    if (!calcBuffer.includes(".")) calcBuffer += ".";
  } else if (key === "C") {
    calcBuffer = "0";
    calcLastOp = null;
    calcStored = null;
  } else if (key === "←") {
    calcBuffer = calcBuffer.length > 1 ? calcBuffer.slice(0,-1) : "0";
  } else if (["+", "-", "*", "/", "%"].includes(key)) {
    if (calcStored === null) {
      calcStored = parseFloat(calcBuffer);
    } else if (calcLastOp) {
      const current = parseFloat(calcBuffer);
      calcStored = evalCalc(calcStored, current, calcLastOp);
    }
    calcLastOp = key;
    calcBuffer = "0";
  } else if (key === "=") {
    if (calcLastOp !== null && calcStored !== null) {
      const current = parseFloat(calcBuffer);
      calcBuffer = String(evalCalc(calcStored, current, calcLastOp));
      calcStored = null;
      calcLastOp = null;
    }
  }
  updateCalcDisplay();
}

function evalCalc(a, b, op) {
  if (op === "+") return a + b;
  if (op === "-") return a - b;
  if (op === "*") return a * b;
  if (op === "/") return b === 0 ? 0 : a / b;
  if (op === "%") return a % b;
  return b;
}

document.querySelectorAll('.calc-btn').forEach(btn => {
  btn.addEventListener('click', () => handleCalcKey(btn.getAttribute('data-key')));
});
updateCalcDisplay();

const termOutput = document.getElementById('termOutput');
const termInput = document.getElementById('termInput');

function termPrint(line) {
  const div = document.createElement('div');
  div.textContent = line;
  termOutput.appendChild(div);
  termOutput.scrollTop = termOutput.scrollHeight;
}

function handleCommand(cmd) {
  const trimmed = cmd.trim();
  if (!trimmed) return;

  termPrint(`guest@supernova:~$ ${trimmed}`);

  const [base, ...rest] = trimmed.split(" ");
  const arg = rest.join(" ");

  if (base === "help") termPrint("Commands: help, about, clear, theme, echo");
  else if (base === "about") termPrint("Supernova OS — experimental web desktop environment.");
  else if (base === "clear") termOutput.innerHTML = "";
  else if (base === "theme") {
    const map = { nebula: "theme-nebula", eclipse: "theme-eclipse", aurora: "theme-aurora" };
    if (map[arg]) {
      document.body.className = map[arg];
      localStorage.setItem("supernova_theme", map[arg]);
      termPrint(`Theme set to ${arg}.`);
    } else termPrint("Usage: theme nebula|eclipse|aurora");
  }
  else if (base === "echo") termPrint(arg);
  else termPrint(`Command not found: ${base}`);
}

termPrint("Supernova Terminal");
termPrint("Type 'help' to begin.");

termInput.addEventListener('keydown', e => {
  if (e.key === "Enter") {
    handleCommand(termInput.value);
    termInput.value = "";
  }
});

document.querySelectorAll('.theme-card').forEach(card => {
  card.addEventListener('click', () => {
    const theme = card.getAttribute('data-theme');
    document.body.className = theme;
    localStorage.setItem("supernova_theme", theme);
  });
});

const savedTheme = localStorage.getItem("supernova_theme");
if (savedTheme) document.body.className = savedTheme;

const notesArea = document.getElementById('notesArea');
const NOTES_KEY = "supernova_os_notes";

const savedNotes = localStorage.getItem(NOTES_KEY);
if (savedNotes !== null) notesArea.value = savedNotes;

notesArea.addEventListener('input', () => {
  localStorage.setItem(NOTES_KEY, notesArea.value);
});

document.getElementById("clearCacheBtn").onclick = () => {
  localStorage.removeItem("supernova_theme");
  localStorage.removeItem("supernova_os_notes");
  location.reload();
};

let favs = JSON.parse(localStorage.getItem("supernova_game_favs") || "[]");

function saveFavs() {
  localStorage.setItem("supernova_game_favs", JSON.stringify(favs));
}

function renderGamesGrid() {
  const grid = document.getElementById("gamesGrid");
  const content = document.getElementById("gamesContent");
  const title = document.getElementById("gamesTitle");

  if (!grid || !content || !title) return;

  title.textContent = "Games";
  title.style.cursor = "default";
  title.onclick = null;

  content.innerHTML = "";
  content.appendChild(grid);
  grid.innerHTML = "";

  GAMES.forEach(game => {
    const card = document.createElement("div");
    card.style.padding = "10px";
    card.style.borderRadius = "10px";
    card.style.border = "1px solid rgba(255,255,255,0.08)";
    card.style.background = "rgba(15,23,42,0.9)";
    card.style.display = "flex";
    card.style.flexDirection = "column";
    card.style.gap = "6px";
    card.style.cursor = "pointer";
    card.style.transition = "transform 0.15s, box-shadow 0.15s";

    card.onmouseenter = () => {
      card.style.transform = "translateY(-2px)";
      card.style.boxShadow = "0 10px 25px rgba(0,0,0,0.45)";
    };
    card.onmouseleave = () => {
      card.style.transform = "none";
      card.style.boxShadow = "none";
    };

    const top = document.createElement("div");
    top.style.display = "flex";
    top.style.justifyContent = "space-between";
    top.style.alignItems = "center";

    const left = document.createElement("div");
    left.style.display = "flex";
    left.style.alignItems = "center";
    left.style.gap = "8px";

    const icon = document.createElement("div");
    icon.textContent = game.emoji || "🎮";
    icon.style.fontSize = "1.4rem";

    const name = document.createElement("div");
    name.textContent = game.name;
    name.style.fontSize = "0.9rem";

    left.appendChild(icon);
    left.appendChild(name);

    const fav = document.createElement("button");
    fav.textContent = favs.includes(game.name) ? "★" : "☆";
    fav.style.border = "none";
    fav.style.background = "transparent";
    fav.style.color = "#facc15";
    fav.style.cursor = "pointer";
    fav.style.fontSize = "1.1rem";

    fav.onclick = (e) => {
      e.stopPropagation();
      if (favs.includes(game.name)) {
        favs = favs.filter(f => f !== game.name);
      } else {
        favs.push(game.name);
      }
      saveFavs();
      renderGamesGrid();
    };

    top.appendChild(left);
    top.appendChild(fav);

    const play = document.createElement("button");
    play.textContent = "Play";
    play.style.marginTop = "4px";
    play.style.padding = "6px 8px";
    play.style.borderRadius = "8px";
    play.style.border = "1px solid rgba(255,255,255,0.12)";
    play.style.background = "rgba(37,99,235,0.9)";
    play.style.color = "white";
    play.style.fontSize = "0.8rem";
    play.style.cursor = "pointer";

    play.onclick = (e) => {
      e.stopPropagation();
      openGameInsideWindow(game);
    };

    card.onclick = () => {
      openGameInsideWindow(game);
    };

    card.appendChild(top);
    card.appendChild(play);
    grid.appendChild(card);
  });
}

function openGameInsideWindow(game) {
  const content = document.getElementById("gamesContent");
  const title = document.getElementById("gamesTitle");
  if (!content || !title) return;

  title.textContent = "Back";
  title.style.cursor = "pointer";
  title.onclick = () => {
    renderGamesGrid();
  };

  content.innerHTML = `
    <iframe src="${game.url}" style="width:100%;height:100%;border:none;"></iframe>
  `;
}

renderGamesGrid();
