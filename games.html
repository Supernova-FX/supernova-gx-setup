    margin-bottom: 12px;
    font-size: 1.4rem;
    color: #a78bfa;
  }

  .search {
    width: 100%;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: white;
    margin-bottom: 14px;
    outline: none;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }

  .game-card {
    padding: 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    transition: transform 0.15s ease;
    position: relative;
  }

  .game-card:hover {
    transform: translateY(-3px);
  }

  .fav {
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 1.1rem;
    cursor: pointer;
    color: #facc15;
  }
</style>

/* ⭐ Favorites stored locally inside games.html */
let favorites = JSON.parse(localStorage.getItem("supernova_game_favs") || "[]");

function saveFavs() {
  localStorage.setItem("supernova_game_favs", JSON.stringify(favorites));
}

/* ⭐ Render game grid */
function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  GAMES.filter(g => g.name.toLowerCase().includes(q)).forEach(game => {
    const card = document.createElement("div");
    card.className = "game-card";
    card.innerHTML = `
      <div class="fav">${favorites.includes(game.name) ? "★" : "☆"}</div>
      ${game.name}
    `;

    /* Toggle favorite */
    card.querySelector(".fav").onclick = (e) => {
      e.stopPropagation();
      if (favorites.includes(game.name)) {
        favorites = favorites.filter(f => f !== game.name);
      } else {
        favorites.push(game.name);
      }
      saveFavs();
      render();
    };

    /* Launch game */
    card.onclick = () => {
      window.parent.postMessage({
        type: "openGameWindow",
        url: game.url,
        name: game.name
      }, "*");
    };

    grid.appendChild(card);
  });
}

document.getElementById("search").oninput = render;
render();
